<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyrio Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at top right, #E0E7FF, transparent),
                              radial-gradient(circle at bottom left, #FCE7F3, transparent);
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #app {
            width: 100%;
            height: 90vh; /* Takes up most of the viewport height */
            max-width: 1400px;
            display: grid;
            grid-template-columns: 2fr 1fr; /* Calendar 2/3, Sidebar 1/3 */
            grid-template-rows: min-content min-content 1fr;    /* Sidebar splits with Chat filling remaining height */
            gap: 1.5rem;
        }

        /* --- Global Card Style --- */
        .card {
            background: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* --- Calendar Section --- */
        .calendar-section {
            grid-column: 1 / 2;
            grid-row: 1 / 4;
            /* Flex rendering handled inside the JS component generation */
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(135deg, #4F46E5, #6366F1);
            color: white;
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 1.75rem;
            font-weight: 600;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .calendar-body {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 1fr; /* Allow rows to expand evenly */
            gap: 12px;
            flex-grow: 1; /* Take remaining height */
        }

        /* Adjust day style for larger grid */
        .day {
            min-height: 100px; /* Minimum height for larger calendar */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 4px;
            cursor: pointer;
            border-radius: 12px;
            font-size: 1.1rem;
            color: var(--text-main);
            background-color: #F9FAFB;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .day:not(.empty):hover {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .day.empty {
            background-color: transparent;
            cursor: default;
        }

        .day.today {
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .day.selected {
            background-color: var(--text-main);
            color: white;
        }

        .day.other-month {
            color: #D1D5DB;
        }
        
        .day-task-container {
            width: 100%;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .day-task-pill {
            background-color: rgba(79, 70, 229, 0.15); /* light primary */
            color: var(--primary);
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            box-sizing: border-box;
            font-weight: 500;
            text-align: left;
        }
        
        .day.today .day-task-pill, .day.selected .day-task-pill {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .day-task-pill.completed {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .day-task-pill.more {
            background-color: transparent;
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
        }
        
        .day.today .day-task-pill.more, .day.selected .day-task-pill.more {
             color: rgba(255,255,255, 0.8);
        }

        /* --- Upcoming Reminders List --- */
        .upcoming-section {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }
        
        .upcoming-content {
            padding: 1rem 1.5rem;
            overflow-y: auto;
            max-height: 250px;
            flex-grow: 1;
        }
        
        .upcoming-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .upcoming-item:last-child {
            border-bottom: none;
        }
        
        .upcoming-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .upcoming-title {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 500;
        }
        
        .upcoming-meta {
            margin: 0;
            font-size: 0.75rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- Task List Section --- */
        .task-section {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
        }

        .section-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-content {
            padding: 1rem 1.5rem;
            overflow-y: auto;
            max-height: 250px;
            flex-grow: 1;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-item.completed {
            opacity: 0.6;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
        }

        .task-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .task-text-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .task-text {
            font-size: 0.95rem;
            color: var(--text-main);
            transition: color 0.2s;
        }
        
        .task-time-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-body);
            padding: 2px 6px;
            border-radius: 4px;
            align-self: flex-start;
        }
        
        .empty-state {
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
            padding: 2rem 0;
            font-size: 0.95rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #EF4444;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .task-item:hover .delete-btn {
            opacity: 1;
        }

        /* --- Chat Section --- */
        .chat-section {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
        }

        .chat-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.incoming {
            background-color: #F3F4F6;
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.outgoing {
            background-color: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex-grow: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--primary);
        }

        .chat-send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-send-btn:hover {
            background: #4338CA;
        }
        
        .chat-send-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transform: translateX(-1px); /* Slight visual correction for paper plane icon */
        }

    </style>
</head>
<body>
    <div id="app">
        <!-- Components will be generated here -->
    </div>
    <script src="dist/bundle.js"></script>
</body>
</html>
